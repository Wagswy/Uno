<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Multiplayer</title>
    <style>
        /* =========================================
           CSS STYLES
        ========================================= */
        :root {
            --red: #ff5555;
            --blue: #5555ff;
            --green: #55aa55;
            --yellow: #ffaa00;
            --dark: #222;
            --light: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; color: var(--light); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .hidden { display: none !important; }

        /* Landing / Lobby */
        .landing-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; z-index: 50; position: absolute; width: 100%; background: #1a1a1a; }
        .logo { font-size: 5rem; font-weight: bold; color: var(--red); text-shadow: 2px 2px 0px #fff; margin-bottom: 20px; font-family: 'Arial Black', sans-serif; }
        .card-panel { background: #333; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-panel h2 { text-align: center; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .form-group label { margin-bottom: 5px; font-size: 0.9rem; color: #ccc; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #555; background: #222; color: #fff; font-size: 1rem; width: 100%; }
        .actions { display: flex; flex-direction: column; gap: 15px; }
        .action-box { display: flex; flex-direction: column; gap: 10px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .action-box h3 { font-size: 1rem; color: #aaa; text-align: center; margin-bottom: 5px;}
        .divider { text-align: center; color: #777; font-weight: bold; }
        .error { color: var(--red); text-align: center; margin-top: 15px; font-weight: bold; }
        .highlight { color: var(--yellow); font-family: monospace; font-size: 1.5rem; letter-spacing: 2px; }
        .player-list { list-style: none; margin: 15px 0; background: #222; padding: 10px; border-radius: 6px; max-height: 200px; overflow-y: auto; }
        .player-list li { padding: 8px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; }

        /* Buttons */
        .btn { padding: 12px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; width: 100%; }
        .btn:hover { opacity: 0.8; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.primary { background: var(--blue); color: white; }
        .btn.secondary { background: var(--green); color: white; }
        .btn.warning { background: var(--yellow); color: var(--dark); }
        .btn.danger { background: var(--red); color: white; }

        /* Game Board */
        .game-board { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; width: 100%; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }
        .turn-indicator { font-weight: bold; color: var(--yellow); font-size: 1.2rem; text-align: center; flex: 1; }
        .time-warning { color: var(--red); animation: pulse 1s infinite; font-weight: bold; }

        /* Opponents */
        .opponents-area { display: flex; justify-content: center; gap: 15px; padding: 10px; flex-wrap: wrap; }
        .opponent-tag { background: #333; padding: 8px 12px; border-radius: 8px; text-align: center; border: 2px solid transparent; min-width: 80px; }
        .opponent-tag.active-turn { border-color: var(--yellow); background: #444; }
        .opponent-name { font-size: 0.9rem; font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100px; }
        .opponent-cards { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        .tag { font-size: 0.7rem; background: var(--red); color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }

        /* Center Table */
        .center-table { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .deck-area { display: flex; gap: 20px; align-items: center; position: relative; }
        .color-indicator { width: 30px; height: 30px; border-radius: 50%; border: 3px solid white; position: absolute; right: -40px; top: 50%; transform: translateY(-50%); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .table-actions { display: flex; gap: 10px; }
        .event-log { font-size: 0.9rem; color: #ccc; text-align: center; height: 20px; }

        /* Player Area */
        .player-area { padding-bottom: 20px; }
        .my-info { text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        .hand { display: flex; justify-content: center; gap: 5px; max-width: 100vw; overflow-x: auto; padding: 10px 0; min-height: 140px; }

        /* Cards */
        .card { width: 70px; height: 105px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.8rem; border: 4px solid white; color: white; cursor: pointer; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; user-select: none; flex-shrink: 0; }
        .card::before { content: ""; position: absolute; width: 85%; height: 85%; background: white; border-radius: 50% 10% / 10% 50%; opacity: 0.15; transform: rotate(-45deg); pointer-events: none; }
        .card-back { background: var(--dark); border-color: var(--red); color: var(--red); font-family: 'Arial Black'; cursor: default; }
        .card-back:hover { transform: none; }
        .draw-pile { cursor: pointer; }
        .draw-pile:hover { transform: translateY(-5px); }
        .card.red { background: var(--red); }
        .card.blue { background: var(--blue); }
        .card.green { background: var(--green); }
        .card.yellow { background: var(--yellow); }
        .card.wild, .card.wildDraw4 { background: #222; }
        .card.valid:hover { transform: translateY(-15px); }
        .card.invalid { opacity: 0.5; cursor: not-allowed; }
        .card.invalid:hover { transform: none; }
        .empty-slot { border: 2px dashed #555; background: transparent; cursor: default; box-shadow: none; }
        .logo-small { font-size: 1.2rem; font-family: 'Arial Black'; transform: rotate(-30deg); }
        .card-value { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 1; }

        /* Modals */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: #222; padding: 30px; border-radius: 12px; max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .modal h2 { margin-bottom: 10px; }
        .modal.small { max-width: 300px; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .color-btn { height: 80px; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: transform 0.2s; }
        .color-btn:hover { transform: scale(1.05); border-color: white; }
        .color-btn.red { background: var(--red); }
        .color-btn.blue { background: var(--blue); }
        .color-btn.green { background: var(--green); }
        .color-btn.yellow { background: var(--yellow); }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (min-width: 768px) {
            .card { width: 100px; height: 150px; font-size: 2.5rem; }
            .hand { gap: -30px; }
            .card:not(:last-child) { margin-right: -40px; }
            .card.valid:hover { transform: translateY(-30px); margin-right: 0; z-index: 10; }
        }
    </style>
</head>
<body>

    <!-- =========================================
         LANDING SCREEN 
    ========================================= -->
    <div id="landingScreen" class="landing-container hidden">
        <div class="logo">UNO</div>
        <div class="card-panel">
            <h2>Welcome</h2>
            <div class="form-group">
                <label for="playerName">Your Name</label>
                <input type="text" id="playerName" placeholder="Enter display name" maxlength="12">
            </div>

            <div class="actions">
                <div class="action-box">
                    <h3>Host a Game</h3>
                    <button id="btnCreateRoom" class="btn primary">Create Room</button>
                </div>
                
                <div class="divider">OR</div>

                <div class="action-box">
                    <h3>Join a Game</h3>
                    <input type="text" id="roomCodeInput" placeholder="Room Code (e.g. A1B2)" maxlength="5" style="text-transform: uppercase;">
                    <button id="btnJoinRoom" class="btn secondary">Join Room</button>
                </div>
            </div>
            <p id="errorMsg" class="error hidden"></p>
        </div>
    </div>

    <!-- =========================================
         GAME OVERLAYS 
    ========================================= -->
    <!-- LOBBY OVERLAY -->
    <div id="lobbyScreen" class="overlay hidden">
        <div class="modal">
            <h2>Room Code: <span id="lobbyRoomCode" class="highlight"></span></h2>
            <h3>Players (<span id="playerCount">1</span>/8)</h3>
            <ul id="lobbyPlayerList" class="player-list"></ul>
            <div class="lobby-actions">
                <button id="btnStartGame" class="btn primary hidden">Start Game</button>
                <p id="waitingMsg">Waiting for host to start...</p>
            </div>
        </div>
    </div>

    <!-- WIN SCREEN -->
    <div id="winScreen" class="overlay hidden">
        <div class="modal">
            <h1 id="winMsg">Someone Won!</h1>
            <br>
            <button id="btnRestart" class="btn primary hidden">Play Again</button>
            <p id="restartWaitMsg">Waiting for host to restart...</p>
        </div>
    </div>

    <!-- COLOR PICKER MODAL -->
    <div id="colorPicker" class="overlay hidden">
        <div class="modal small">
            <h3>Choose Color</h3>
            <div class="color-grid">
                <div class="color-btn red" data-color="red"></div>
                <div class="color-btn blue" data-color="blue"></div>
                <div class="color-btn green" data-color="green"></div>
                <div class="color-btn yellow" data-color="yellow"></div>
            </div>
        </div>
    </div>

    <!-- =========================================
         MAIN GAME BOARD 
    ========================================= -->
    <div id="gameBoard" class="game-board hidden">
        <div class="top-bar">
            <div class="room-info">Room: <span id="displayRoomCode"></span></div>
            <div id="turnIndicator" class="turn-indicator"></div>
            <div id="timeWarning" class="time-warning hidden">Hurry!</div>
        </div>

        <div id="opponentsArea" class="opponents-area">
            <!-- Opponent tags injected here -->
        </div>

        <div class="center-table">
            <div class="deck-area">
                <div id="drawPile" class="card card-back draw-pile">
                    <span class="logo-small">UNO</span>
                </div>
                <div id="discardPile" class="card empty-slot"></div>
                <div id="activeColorIndicator" class="color-indicator hidden"></div>
            </div>
            
            <div class="table-actions">
                <button id="btnCallUno" class="btn warning hidden">Call UNO!</button>
                <button id="btnCatchUno" class="btn danger hidden">Catch UNO!</button>
            </div>
            <div id="eventLog" class="event-log"></div>
        </div>

        <div class="player-area">
            <div class="my-info">
                <span id="myName"></span> <span id="myUnoTag" class="tag hidden">UNO!</span>
            </div>
            <div id="myHand" class="hand">
                <!-- Cards injected here -->
            </div>
        </div>
    </div>

    <!-- =========================================
         JAVASCRIPT LOGIC
    ========================================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // =====================================================================
        // 🚨 1. PASTE YOUR FIREBASE CONFIG HERE 🚨
        // Go to Firebase Console -> Project Settings -> Web App to get these values
        // Note: You must also go to Realtime Database -> Rules and set read/write to true!
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB-2YK5exfWTNoKzgOv0L74ZpDK0HPaOuI",
            authDomain: "unowagswy.firebaseapp.com",
            databaseURL: "https://unowagswy-default-rtdb.firebaseio.com",
            projectId: "unowagswy",
            storageBucket: "unowagswy.firebasestorage.app",
            messagingSenderId: "185198536123",
            appId: "1:185198536123:web:cb67057d09ff89dc6a109e"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Globals
        let gameState = null;
        let isHost = false;
        let turnTimer = null;
        let pendingWildCard = null;
        let activeRoomCode = null;

        // Player Session Init
        let playerId = localStorage.getItem('uno_playerId');
        if (!playerId) {
            playerId = 'p_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('uno_playerId', playerId);
        }
        let storedPlayerName = localStorage.getItem('uno_playerName');

        // UI Elements
        const landingScreen = document.getElementById('landingScreen');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const gameBoard = document.getElementById('gameBoard');
        const winScreen = document.getElementById('winScreen');
        const colorPicker = document.getElementById('colorPicker');
        const errorMsg = document.getElementById('errorMsg');
        const playerNameInput = document.getElementById('playerName');
        const roomCodeInput = document.getElementById('roomCodeInput');

        // =====================================================================
        // ROUTING / INITIALIZATION
        // =====================================================================
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomCode = urlParams.get('room');

        if (storedPlayerName) {
            playerNameInput.value = storedPlayerName;
        }

        if (urlRoomCode) {
            // User arrived via an invite link
            activeRoomCode = urlRoomCode.toUpperCase();
            roomCodeInput.value = activeRoomCode;
            
            if (!storedPlayerName) {
                // Have code, but no name yet. Show landing page to get name.
                landingScreen.classList.remove('hidden');
            } else {
                // Have code and name. Jump straight in!
                connectToRoom(activeRoomCode);
            }
        } else {
            // Standard visit
            landingScreen.classList.remove('hidden');
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        // =====================================================================
        // LANDING PAGE ACTIONS (Create / Join)
        // =====================================================================
        document.getElementById('btnCreateRoom').addEventListener('click', async () => {
            const name = playerNameInput.value.trim();
            if (!name) return showError("Please enter your name");
            
            const btn = document.getElementById('btnCreateRoom');
            btn.disabled = true;
            btn.textContent = "Creating...";
            
            try {
                const newCode = Math.random().toString(36).substring(2, 7).toUpperCase();
                const newRoomRef = ref(db, `rooms/${newCode}`);
                
                await set(newRoomRef, {
                    state: 'lobby',
                    players: { [playerId]: { name, isHost: true } },
                    playerOrder: [playerId],
                    createdAt: Date.now()
                });

                localStorage.setItem('uno_playerName', name);
                window.location.search = `?room=${newCode}`; // Triggers a reload to jump into game
            } catch (error) {
                console.error(error);
                showError("Database Error: Check console. Did you configure Firebase rules?");
                btn.disabled = false;
                btn.textContent = "Create Room";
            }
        });

        document.getElementById('btnJoinRoom').addEventListener('click', async () => {
            const name = playerNameInput.value.trim();
            const code = roomCodeInput.value.trim().toUpperCase();
            
            if (!name) return showError("Please enter your name");
            if (!code || code.length < 4) return showError("Please enter a valid room code");

            const btn = document.getElementById('btnJoinRoom');
            btn.disabled = true;
            btn.textContent = "Joining...";

            try {
                const snap = await get(ref(db, `rooms/${code}`));
                if (!snap.exists()) {
                    btn.disabled = false;
                    btn.textContent = "Join Room";
                    return showError("Room not found");
                }
                
                const room = snap.val();
                if (room.state !== 'lobby') {
                    btn.disabled = false;
                    btn.textContent = "Join Room";
                    return showError("Game has already started");
                }
                
                if (room.playerOrder && room.playerOrder.length >= 8 && !room.players[playerId]) {
                    btn.disabled = false;
                    btn.textContent = "Join Room";
                    return showError("Room is full (8 players max)");
                }

                localStorage.setItem('uno_playerName', name);
                window.location.search = `?room=${code}`; // Triggers a reload to jump into game
            } catch (error) {
                console.error(error);
                showError("Database Error: Check console");
                btn.disabled = false;
                btn.textContent = "Join Room";
            }
        });

        // =====================================================================
        // CORE GAME / ROOM LOGIC
        // =====================================================================
        async function connectToRoom(code) {
            landingScreen.classList.add('hidden');
            const roomRef = ref(db, `rooms/${code}`);
            
            try {
                const snap = await get(roomRef);
                if (!snap.exists()) {
                    alert("Room closed or doesn't exist.");
                    window.location.search = '';
                    return;
                }
                
                const room = snap.val();
                let players = room.players || {};
                let order = room.playerOrder || [];

                // Setup presence handling (marks player offline if they close tab)
                const myPlayerRef = ref(db, `rooms/${code}/players/${playerId}`);
                onDisconnect(myPlayerRef).update({ online: false });

                const pName = localStorage.getItem('uno_playerName');

                if (!players[playerId]) {
                    players[playerId] = { name: pName, online: true, hand: [], unoCalled: false };
                    order.push(playerId);
                    await update(roomRef, { players, playerOrder: order });
                } else {
                    await update(myPlayerRef, { online: true, name: pName });
                }

                isHost = players[playerId].isHost;
                
                // Listen for live room updates
                onValue(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        gameState = snapshot.val();
                        updateUI();
                    } else {
                        alert("Room closed by host.");
                        window.location.search = '';
                    }
                });
            } catch (err) {
                console.error("Connection failed:", err);
                alert("Could not connect to game. Check your database rules and config.");
                window.location.search = '';
            }
        }

        // =====================================================================
        // DECK GENERATION & START GAME
        // =====================================================================
        function generateDeck() {
            const colors = ['red', 'blue', 'green', 'yellow'];
            let deck = [];
            let idCounter = 0;

            colors.forEach(color => {
                deck.push({ id: `c_${idCounter++}`, color, type: 'number', value: '0' });
                for (let i = 1; i <= 9; i++) {
                    deck.push({ id: `c_${idCounter++}`, color, type: 'number', value: i.toString() });
                    deck.push({ id: `c_${idCounter++}`, color, type: 'number', value: i.toString() });
                }
                ['skip', 'reverse', 'draw2'].forEach(type => {
                    deck.push({ id: `c_${idCounter++}`, color, type, value: type === 'draw2' ? '+2' : (type === 'skip' ? '⊘' : '⇄') });
                    deck.push({ id: `c_${idCounter++}`, color, type, value: type === 'draw2' ? '+2' : (type === 'skip' ? '⊘' : '⇄') });
                });
            });

            for (let i = 0; i < 4; i++) {
                deck.push({ id: `c_${idCounter++}`, color: 'wild', type: 'wild', value: 'W' });
                deck.push({ id: `c_${idCounter++}`, color: 'wild', type: 'wildDraw4', value: '+4' });
            }

            // Shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        document.getElementById('btnStartGame').addEventListener('click', async () => {
            if (!isHost) return;
            
            let deck = generateDeck();
            let players = { ...gameState.players };
            let order = gameState.playerOrder.filter(id => players[id].online);
            
            // Deal 7 cards to each online player
            order.forEach(id => {
                players[id].hand = deck.splice(0, 7);
                players[id].unoCalled = false;
            });

            // First card must be a number to avoid immediate complex logic
            let firstCardIndex = deck.findIndex(c => c.type === 'number');
            let discard = [deck.splice(firstCardIndex, 1)[0]];

            await update(ref(db, `rooms/${activeRoomCode}`), {
                state: 'playing',
                players,
                playerOrder: order,
                deck,
                discard,
                activeColor: discard[0].color,
                turnIndex: 0,
                direction: 1,
                lastAction: 'Game started!',
                turnStartTime: Date.now()
            });
        });

        // =====================================================================
        // UI RENDERING & GAME LOOP
        // =====================================================================
        function updateUI() {
            if (gameState.state === 'lobby') {
                renderLobby();
            } else if (gameState.state === 'playing') {
                lobbyScreen.classList.add('hidden');
                winScreen.classList.add('hidden');
                gameBoard.classList.remove('hidden');
                renderGame();
                checkTimeouts();
            } else if (gameState.state === 'finished') {
                renderWinScreen();
            }
        }

        function renderLobby() {
            lobbyScreen.classList.remove('hidden');
            document.getElementById('lobbyRoomCode').textContent = activeRoomCode;
            
            const list = document.getElementById('lobbyPlayerList');
            list.innerHTML = '';
            
            let onlineCount = 0;
            gameState.playerOrder.forEach(id => {
                const p = gameState.players[id];
                if (p.online) {
                    onlineCount++;
                    const li = document.createElement('li');
                    li.textContent = p.name + (p.isHost ? ' (Host)' : '');
                    list.appendChild(li);
                }
            });

            document.getElementById('playerCount').textContent = onlineCount;

            if (isHost) {
                document.getElementById('btnStartGame').classList.remove('hidden');
                document.getElementById('btnStartGame').disabled = onlineCount < 2;
                document.getElementById('waitingMsg').classList.add('hidden');
            }
        }

        function renderGame() {
            const { players, playerOrder, turnIndex, discard, activeColor, lastAction } = gameState;
            const currentTurnId = playerOrder[turnIndex];
            const isMyTurn = currentTurnId === playerId;
            const myPlayer = players[playerId];
            const topCard = discard[discard.length - 1];

            document.getElementById('displayRoomCode').textContent = activeRoomCode;
            document.getElementById('eventLog').textContent = lastAction || '';
            
            const turnName = isMyTurn ? "Your turn!" : `${players[currentTurnId].name}'s turn`;
            document.getElementById('turnIndicator').textContent = turnName;

            // Discard pile & color
            const discardEl = document.getElementById('discardPile');
            discardEl.className = `card ${topCard.color === 'wild' ? 'wild' : topCard.color}`;
            discardEl.innerHTML = `<span class="card-value">${topCard.value}</span>`;
            
            const colorInd = document.getElementById('activeColorIndicator');
            if (topCard.type.includes('wild') || activeColor) {
                colorInd.classList.remove('hidden');
                colorInd.style.backgroundColor = `var(--${activeColor})`;
            } else {
                colorInd.classList.add('hidden');
            }

            // My Hand
            const handEl = document.getElementById('myHand');
            handEl.innerHTML = '';
            
            const hand = myPlayer.hand || [];
            hand.forEach((card, index) => {
                const div = document.createElement('div');
                const isValid = isMyTurn && (card.color === 'wild' || card.color === activeColor || card.value === topCard.value);
                
                div.className = `card ${card.color} ${isValid ? 'valid' : 'invalid'}`;
                div.innerHTML = `<span class="card-value">${card.value}</span>`;
                
                if (isValid) {
                    div.addEventListener('click', () => handleCardClick(card, index));
                }
                handEl.appendChild(div);
            });

            document.getElementById('myName').textContent = myPlayer.name;
            document.getElementById('myUnoTag').classList.toggle('hidden', !myPlayer.unoCalled);

            // Opponents
            const oppArea = document.getElementById('opponentsArea');
            oppArea.innerHTML = '';
            playerOrder.forEach(id => {
                if (id === playerId) return;
                const p = players[id];
                if (!p.online) return;
                
                const count = (p.hand || []).length;
                const div = document.createElement('div');
                div.className = `opponent-tag ${currentTurnId === id ? 'active-turn' : ''}`;
                div.innerHTML = `
                    <span class="opponent-name">${p.name}</span>
                    <div class="opponent-cards">${count} cards ${p.unoCalled ? '<span class="tag">UNO</span>' : ''}</div>
                `;
                oppArea.appendChild(div);
            });

            // UNO Buttons
            const btnCallUno = document.getElementById('btnCallUno');
            btnCallUno.classList.toggle('hidden', hand.length > 2); // Show if 2 or fewer cards
            
            // Check if anyone can be caught
            const canCatch = playerOrder.some(id => id !== playerId && players[id].online && players[id].hand && players[id].hand.length === 1 && !players[id].unoCalled);
            document.getElementById('btnCatchUno').classList.toggle('hidden', !canCatch);
        }

        // =====================================================================
        // INTERACTIONS & TURN LOGIC
        // =====================================================================
        async function handleCardClick(card, handIndex) {
            if (card.color === 'wild') {
                pendingWildCard = { card, index: handIndex };
                colorPicker.classList.remove('hidden');
            } else {
                await playCard(card, handIndex, card.color);
            }
        }

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const color = e.target.dataset.color;
                colorPicker.classList.add('hidden');
                if (pendingWildCard) {
                    await playCard(pendingWildCard.card, pendingWildCard.index, color);
                    pendingWildCard = null;
                }
            });
        });

        async function playCard(card, handIndex, chosenColor) {
            const { players, playerOrder, turnIndex, direction, deck, discard } = gameState;
            
            let myHand = [...players[playerId].hand];
            myHand.splice(handIndex, 1);
            
            // Reset UNO called status if hand goes above 1 somehow, maintain if at 1
            let myUnoCalled = myHand.length === 1 ? players[playerId].unoCalled : false;

            let newDiscard = [...discard, card];
            let nextTurnIndex = turnIndex;
            let nextDirection = direction;
            let cardsToDraw = 0;
            let skipNext = false;
            let actionText = `${players[playerId].name} played ${card.color !== 'wild' ? card.color : ''} ${card.value}`;

            if (card.type === 'reverse') {
                nextDirection = playerOrder.length > 2 ? direction * -1 : direction; 
                if (playerOrder.length === 2) skipNext = true; // Reverse acts as skip in 2 player
            } else if (card.type === 'skip') {
                skipNext = true;
            } else if (card.type === 'draw2') {
                cardsToDraw = 2;
                skipNext = true;
            } else if (card.type === 'wildDraw4') {
                cardsToDraw = 4;
                skipNext = true;
            }

            // Calculate next turn
            nextTurnIndex = getNextTurnIndex(turnIndex, nextDirection, playerOrder.length);
            if (skipNext) {
                nextTurnIndex = getNextTurnIndex(nextTurnIndex, nextDirection, playerOrder.length);
            }

            let updates = {
                [`players/${playerId}/hand`]: myHand,
                [`players/${playerId}/unoCalled`]: myUnoCalled,
                discard: newDiscard,
                activeColor: chosenColor,
                direction: nextDirection,
                turnIndex: nextTurnIndex,
                lastAction: actionText,
                turnStartTime: Date.now()
            };

            // Handle forced draws on next player
            if (cardsToDraw > 0) {
                let currentDeck = [...deck];
                let targetId = playerOrder[getNextTurnIndex(turnIndex, nextDirection, playerOrder.length)];
                let targetHand = [...players[targetId].hand];
                
                for (let i = 0; i < cardsToDraw; i++) {
                    if (currentDeck.length === 0) currentDeck = reshuffleDeck(newDiscard, currentDeck);
                    if (currentDeck.length > 0) targetHand.push(currentDeck.pop());
                }
                updates[`deck`] = currentDeck;
                updates[`players/${targetId}/hand`] = targetHand;
                updates[`players/${targetId}/unoCalled`] = false;
            }

            // Check Win Condition
            if (myHand.length === 0) {
                updates.state = 'finished';
                updates.lastAction = `${players[playerId].name} won the game!`;
            }

            await update(ref(db, `rooms/${activeRoomCode}`), updates);
        }

        document.getElementById('drawPile').addEventListener('click', async () => {
            const { playerOrder, turnIndex } = gameState;
            if (playerOrder[turnIndex] !== playerId) return;

            await executeDraw(playerId, 1, true);
        });

        async function executeDraw(targetPlayerId, numCards, passTurn = false) {
            const { deck, discard, players, playerOrder, turnIndex, direction } = gameState;
            let currentDeck = [...deck];
            let targetHand = [...players[targetPlayerId].hand];

            for (let i = 0; i < numCards; i++) {
                if (currentDeck.length === 0) currentDeck = reshuffleDeck(discard, currentDeck);
                if (currentDeck.length > 0) targetHand.push(currentDeck.pop());
            }

            let updates = {
                deck: currentDeck,
                [`players/${targetPlayerId}/hand`]: targetHand,
                [`players/${targetPlayerId}/unoCalled`]: false
            };

            if (passTurn) {
                updates.turnIndex = getNextTurnIndex(turnIndex, direction, playerOrder.length);
                updates.lastAction = `${players[targetPlayerId].name} drew a card.`;
                updates.turnStartTime = Date.now();
            }

            await update(ref(db, `rooms/${activeRoomCode}`), updates);
        }

        function reshuffleDeck(discard, currentDeck) {
            if (discard.length <= 1) return currentDeck;
            let newDeck = discard.splice(0, discard.length - 1);
            for (let i = newDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
            }
            update(ref(db, `rooms/${activeRoomCode}`), { discard }); // Async write to sync shrunk discard
            return newDeck;
        }

        function getNextTurnIndex(currentIndex, dir, totalPlayers) {
            let next = (currentIndex + dir) % totalPlayers;
            if (next < 0) next += totalPlayers;
            return next;
        }

        // =====================================================================
        // UNO MECHANICS & TIMEOUTS
        // =====================================================================
        document.getElementById('btnCallUno').addEventListener('click', async () => {
            const hand = gameState.players[playerId].hand;
            if (hand.length <= 2) {
                await update(ref(db, `rooms/${activeRoomCode}`), { [`players/${playerId}/unoCalled`]: true });
            }
        });

        document.getElementById('btnCatchUno').addEventListener('click', async () => {
            const { players, playerOrder } = gameState;
            for (let id of playerOrder) {
                if (id !== playerId && players[id].online && players[id].hand && players[id].hand.length === 1 && !players[id].unoCalled) {
                    await executeDraw(id, 2, false);
                    await update(ref(db, `rooms/${activeRoomCode}`), { lastAction: `${players[playerId].name} caught ${players[id].name} not calling UNO!` });
                    break;
                }
            }
        });

        function checkTimeouts() {
            if (turnTimer) clearInterval(turnTimer);
            turnTimer = setInterval(async () => {
                if (gameState?.state !== 'playing') return;
                
                const now = Date.now();
                const turnStart = gameState.turnStartTime || now;
                const diff = now - turnStart;
                
                const currentTurnId = gameState.playerOrder[gameState.turnIndex];
                const isMyTurn = currentTurnId === playerId;

                // Visual warning at 20s
                if (isMyTurn && diff > 20000) {
                    document.getElementById('timeWarning').classList.remove('hidden');
                } else {
                    document.getElementById('timeWarning').classList.add('hidden');
                }

                // Force pass at 30s. Host enforces. If host offline, next player enforces.
                if (diff > 30000) {
                    const hostId = gameState.playerOrder.find(id => gameState.players[id].isHost);
                    const isHostOnline = gameState.players[hostId]?.online;
                    let shouldEnforce = false;
                    
                    if (isHost && isHostOnline) {
                        shouldEnforce = true;
                    } else if (!isHostOnline) {
                        if (diff > 32000) shouldEnforce = true; // Stagger to prevent collision
                    }

                    if (shouldEnforce) {
                        clearInterval(turnTimer); // Prevent spamming
                        await executeDraw(currentTurnId, 1, true);
                        await update(ref(db, `rooms/${activeRoomCode}`), { lastAction: `${gameState.players[currentTurnId].name} took too long and was skipped.` });
                    }
                }
            }, 1000);
        }

        // =====================================================================
        // WIN STATE / RESTART
        // =====================================================================
        function renderWinScreen() {
            gameBoard.classList.add('hidden');
            winScreen.classList.remove('hidden');
            document.getElementById('winMsg').textContent = gameState.lastAction;
            
            if (isHost) {
                document.getElementById('btnRestart').classList.remove('hidden');
                document.getElementById('restartWaitMsg').classList.add('hidden');
            }
        }

        document.getElementById('btnRestart').addEventListener('click', async () => {
            if (!isHost) return;
            await update(ref(db, `rooms/${activeRoomCode}`), { state: 'lobby', lastAction: null });
        });

    </script>
</body>
</html>
